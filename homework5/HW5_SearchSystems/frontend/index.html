<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScaleSearch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }
    header span { font-size: 0.75rem; background: #4a6cf7; border-radius: 4px; padding: 2px 8px; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      max-width: 1100px;
      width: 100%;
      margin: 32px auto;
      padding: 0 16px;
    }

    /* ── Sidebar ── */
    aside {
      padding-right: 28px;
    }

    .sidebar-section { margin-bottom: 28px; }
    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 10px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.88rem;
      color: #555;
      cursor: pointer;
      transition: background 0.12s;
    }
    .history-item:hover { background: #eaecf8; color: #4a6cf7; }
    .history-icon { font-size: 0.75rem; opacity: 0.5; }

    .empty-state { font-size: 0.82rem; color: #bbb; padding: 6px 10px; }

    /* ── Search area ── */
    .content { min-width: 0; }

    .search-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    #search-input {
      width: 100%;
      padding: 13px 52px 13px 18px;
      font-size: 1rem;
      border: 2px solid #dde0f0;
      border-radius: 10px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-input:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 3px rgba(74,108,247,0.12);
    }

    #search-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #search-btn:hover { background: #3a5ce0; }

    /* ── Autocomplete dropdown ── */
    #suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #dde0f0;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      z-index: 200;
      overflow: hidden;
    }

    .suggestion-item {
      padding: 10px 18px;
      font-size: 0.92rem;
      color: #333;
      cursor: pointer;
      transition: background 0.1s;
    }
    .suggestion-item:hover,
    .suggestion-item.active { background: #eef1ff; color: #4a6cf7; }
    .suggestion-item .match { font-weight: 600; }

    /* ── Results ── */
    #results-meta {
      font-size: 0.93rem;
      color: #444;
      margin-bottom: 14px;
      min-height: 22px;
      font-weight: 500;
    }

    #results-meta.error {
      color: #c0392b;
    }

    #results-meta.loading {
      color: #4a6cf7;
    }

    #server-warning {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      color: #856404;
    }

    .result-card {
      background: #fff;
      border: 1px solid #e4e7f2;
      border-radius: 9px;
      padding: 14px 18px;
      margin-bottom: 8px;
      font-size: 0.93rem;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .result-card:hover { border-color: #4a6cf7; }

    /* ── Did you mean ── */
    #spell-suggestion {
      display: none;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #555;
    }
    #spell-suggestion a {
      color: #4a6cf7;
      text-decoration: none;
      font-weight: 500;
    }
    #spell-suggestion a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <h1>ScaleSearch</h1>
  <span>beta</span>
</header>

<main>
  <!-- Sidebar: recent searches -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Recent searches</div>
      <div id="history-list">
        <div class="empty-state">No recent searches</div>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="content">
    <div class="search-wrapper">
      <input
        id="search-input"
        type="text"
        placeholder="Search..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-btn">Search</button>
      <div id="suggestions"></div>
    </div>

    <div id="server-warning">⚠️ Could not reach the server. Make sure <code>java -cp out SearchApp small</code> is running on port 8080.</div>
    <div id="spell-suggestion"></div>
    <div id="results-meta"></div>
    <div id="results-list"></div>
  </div>
</main>

<script src="search.js"></script>
</body>
</html>
